<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <link rel="stylesheet" href="./css/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-book</title>
</head>

<body>

  <div class="container">
    <div class="div-esquerda">
      <h2> Receba agora o melhor e-book <br> disponível em nosso site. </h2>
      <p> Fusce non bibendum dui. Nullam arcu ex, semper <br>sit amet tellus non, semper tempus dui. Praesent <br> cursus ligula et faucibus pulvinar. Vestibulum <br> faucibus posuere diam nec semper semper.</p>


      <div class="formulario-container">
        <section class="contato-formulario" aria-label="Formulário">
          <form class="form" action="./contato.html">
            <div>
              <label for="nome">Nome</label>
              <input type="text" id="nome" name="nome" placeholder="Seu nome">
            </div>
            <div>
              <label for="telefone">Telefone</label>
              <input type="text" id="telefone" name="telefone" placeholder="(11) 9999-9999">
            </div>
            <div class="col-2">
              <label for="email">E-mail</label>
              <input type="email" id="email" name="email" placeholder="contato@email.com">
            </div>
            <button class="botao">Receba agora</button>
          </form>
        </section>
      </div>

      <div class="contato-redes">
        <a href="./">
          <img src="./imagens/redes/instagram.svg" alt="Instagram">
        </a>
        <a href="./">
          <img src="./imagens/redes/fb.svg" alt="Facebook">
        </a>
        <a href="./">
          <img src="./imagens/redes/yt.svg" alt="Youtube">
        </a>
      </div>
    </div>

    <div class="div-direita">
      <img src="./imagens/teste2_cricao_ebook.jpg">
    </div>
  </div>
</body>

</html>
